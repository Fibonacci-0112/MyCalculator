name: Build and Deploy Blazor WASM to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "PaycheckCalc.Web/**"
      - "PaycheckCalc.Core/**"
      - "global.json"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

# Allow deployment to GitHub Pages; read repository contents.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; do not cancel in-progress runs.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # PaycheckCalc.Web targets net9.0 (stable) — see PaycheckCalc.Web/README.md.
      # The root global.json pins .NET 11 preview; PaycheckCalc.Web/global.json
      # overrides to net9.0 when commands are run from that directory.
      - name: Setup .NET 9 (for Blazor WASM)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      # Install the Blazor WASM workload under the .NET 9 SDK.
      # Running from PaycheckCalc.Web ensures the local global.json (net9.0) is used.
      - name: Install Blazor WASM workload
        working-directory: PaycheckCalc.Web
        run: dotnet workload install wasm-tools

      # Publish the Blazor WASM app.
      # Output: <repo-root>/publish/wwwroot/  (index.html, _framework/, css/, js/)
      - name: Publish Blazor WASM
        working-directory: PaycheckCalc.Web
        run: dotnet publish PaycheckCalc.Web.csproj -c Release -o ../publish

      # Overwrite the source 404.html with the freshly-published index.html so
      # they are always identical. GitHub Pages serves 404.html for unknown paths;
      # Blazor boots from 404.html (which is a copy of index.html) and the Router
      # navigates to the correct page using the actual URL path.
      - name: Copy index.html → 404.html (idempotent)
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      # Prevent Jekyll from stripping the _framework/ directory.
      - name: Ensure .nojekyll exists
        run: touch publish/wwwroot/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
