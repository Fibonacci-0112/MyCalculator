<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PaycheckCalc — 2026 Paycheck Calculator</title>
    <!--
      base href is rewritten by the GitHub Pages publish workflow when the
      site is hosted from a project subpath (e.g. /MyCalculator/). Leave it
      as "/" here for local `dotnet run` and the workflow will overwrite it.
    -->
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="PaycheckCalc.Web.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <!--
      Tiny shim that lets Blazor trigger a JSON download for the
      "Export to JSON" button on the Saved page. Kept out of C# because
      anchor + URL.createObjectURL is browser-only DOM territory.
    -->
    <script>
        window.paycheckcalc = window.paycheckcalc || {};
        window.paycheckcalc.downloadJson = function (fileName, jsonContent) {
            const blob = new Blob([jsonContent], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            setTimeout(function () {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 0);
        };
    </script>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
