<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PaycheckCalc</title>
    <!--
        This file must be a copy of index.html so that GitHub Pages serves the
        Blazor app shell when a deep link (e.g. /MyCalculator/calculator) is
        requested. Blazor boots, reads the actual URL path, and the Router
        navigates to the correct component — no query-string redirect needed.

        This file is also overwritten by the CI workflow step:
          cp publish/wwwroot/index.html publish/wwwroot/404.html
        so it always stays in sync with index.html after publish.
    -->
    <base href="/MyCalculator/" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="PaycheckCalc.Web.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui" role="alert">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/download.js"></script>
</body>

</html>
